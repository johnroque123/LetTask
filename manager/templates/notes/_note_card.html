<div class="note-card group relative rounded-2xl border border-slate-200 p-4 cursor-pointer transition hover:shadow-md"
     style="background-color: {% if note.color == 'yellow' %}#fef9c3{% elif note.color == 'blue' %}#dbeafe{% elif note.color == 'green' %}#dcfce7{% elif note.color == 'pink' %}#fce7f3{% elif note.color == 'purple' %}#ede9fe{% else %}#ffffff{% endif %};"
     data-note-id="{{ note.pk }}"
     data-titleraw="{{ note.title|lower }}"
     data-contentraw="{{ note.content|lower }}"
     data-title="{{ note.title|escapejs }}"
     data-content="{{ note.content|escapejs }}"
     data-color="{{ note.color }}"
     onclick="openEditFromCard(this)">

    <div class="flex items-start justify-between gap-2 mb-2">
        {% if note.title %}
            <p class="note-title text-sm font-semibold text-slate-800 truncate">{{ note.title }}</p>
        {% else %}
            <p class="note-title text-xs text-slate-400">Untitled</p>
        {% endif %}

        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition shrink-0"
             onclick="event.stopPropagation()">
            <button onclick="togglePin({{ note.pk }}, this)"
                    title="{% if note.is_pinned %}Unpin{% else %}Pin{% endif %}"
                    class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-black/10 transition text-sm
                           {% if note.is_pinned %}text-amber-500{% else %}text-slate-400 hover:text-slate-700{% endif %}">
                📌
            </button>
            <button onclick="deleteNote({{ note.pk }}, this)"
                    title="Delete"
                    class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-red-100 text-slate-400 hover:text-red-500 transition text-sm">
                🗑
            </button>
        </div>
    </div>

    <p class="note-content text-xs text-slate-600 leading-relaxed line-clamp-6 whitespace-pre-wrap">{{ note.content }}</p>
    <p class="note-date text-xs text-slate-400 mt-3">{{ note.updated_at|date:"M d, Y" }}</p>
</div>
